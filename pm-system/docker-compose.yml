# Shared Directus backend for the POP super-app (PIM + CRM + DAM).
# AUTHORITATIVE copy of the deployed Coolify service "directus" (uuid nzli85mk3luzb6u7cnq5fidu) on server onwp0kd7w1w74w9yeotnoihp.
# Live at https://data.designflow.app — the backend API domain (permanent).
# pm.designflow.app temporarily also points here; it is the PM FRONTEND's permanent home and moves to poppim-web at its launch.
# All ${...} values are set as RUNTIME env in Coolify (never in this repo).
# Coolify magic var SERVICE_FQDN_DIRECTUSAPP_8055 + Coolify DB service_applications.fqdn bind the domain (see AGENTS.md §11).
# Volume KEYS are directus-pgdata / directus-extensions (renamed from poppim-* via offline volume copy on 2026-06-10).
# To change the schema: run pm-system/apply-schema.mjs against the instance, then restart the service.
services:
  directus-app:
    image: directus/directus:11
    expose:
      - "8055"
    environment:
      SERVICE_FQDN_DIRECTUSAPP_8055: data.designflow.app
      KEY: ${DX_KEY}
      SECRET: ${DX_SECRET}
      PUBLIC_URL: https://data.designflow.app
      ADMIN_EMAIL: ${DX_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DX_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: "5432"
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${DX_DB_PASSWORD}
      LICENSE_KEY: ${DX_LICENSE_KEY}          # Directus Open Innovation Grant license
      AUTH_PROVIDERS: microsoft
      AUTH_MICROSOFT_DRIVER: openid
      AUTH_MICROSOFT_CLIENT_ID: ${MS_CLIENT_ID}
      AUTH_MICROSOFT_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      AUTH_MICROSOFT_ISSUER_URL: https://login.microsoftonline.com/${MS_TENANT_ID}/v2.0/.well-known/openid-configuration
      AUTH_MICROSOFT_IDENTIFIER_KEY: preferred_username
      AUTH_MICROSOFT_LABEL: "Microsoft"   # Directus renders this as "Log In with Microsoft"
      AUTH_MICROSOFT_ICON: grid_view
      AUTH_MICROSOFT_ALLOW_PUBLIC_REGISTRATION: "true"   # any M365 tenant user auto-provisions
      AUTH_MICROSOFT_DEFAULT_ROLE_ID: "7c7299c9-bf6c-44f6-b952-b6983a3ca6e8"   # non-admin Designer role (instance-specific uuid)
      # CORS + cross-subdomain session cookies so the frontends (pm-dev/pm.designflow.app)
      # can call this API and Microsoft SSO can return into the SPA. (Frontends are sibling subdomains.)
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://pm-dev.designflow.app,https://pm.designflow.app,https://data.designflow.app"
      CORS_CREDENTIALS: "true"
      SESSION_COOKIE_DOMAIN: .designflow.app
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAME_SITE: lax
      REFRESH_TOKEN_COOKIE_DOMAIN: .designflow.app
      REFRESH_TOKEN_COOKIE_SECURE: "true"
      REFRESH_TOKEN_COOKIE_SAME_SITE: lax
      AUTH_MICROSOFT_REDIRECT_ALLOW_LIST: https://pm-dev.designflow.app
      WEBSOCKETS_ENABLED: "true"
      TELEMETRY: "false"
    volumes:
      - directus-extensions:/directus/extensions   # persists Marketplace-installed extensions (e.g. advanced-kanban-layout)
    depends_on:
      - directus-db
  directus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${DX_DB_PASSWORD}
      POSTGRES_DB: directus
    volumes:
      - directus-pgdata:/var/lib/postgresql/data
volumes:
  directus-pgdata:
  directus-extensions:
